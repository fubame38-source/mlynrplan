<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MLYNR Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--surface:#111;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.12);--text:#f0f0f0;--text2:#888;--text3:#444;--green:#22c55e;--red:#f87171;--yellow:#facc15;--blue:#60a5fa;--font:'Geist','Inter',system-ui,sans-serif;--mono:'Geist Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:380px}
.login-logo{font-size:22px;font-weight:900;letter-spacing:-1px;margin-bottom:3px}
.login-sub{font-size:10px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;display:block}
.linput{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;padding:12px 16px;outline:none;margin-bottom:14px}
.linput:focus{border-color:rgba(255,255,255,.3)}
.lbtn{width:100%;background:#fff;color:#000;border:none;border-radius:10px;padding:13px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase}
.lbtn:hover{opacity:.88}
.lerr{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:18px}
#app{display:none;max-width:1200px;margin:0 auto;padding:28px 24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.hlogo{font-size:18px;font-weight:900;letter-spacing:-1px}
.hbadge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:4px 10px;margin-left:10px}
.hright{display:flex;align-items:center;gap:10px}
.lupd{font-size:10px;color:var(--text3);font-family:var(--mono)}
.rbtn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:11px;cursor:pointer}
.rbtn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.obtn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:11px;cursor:pointer}
.obtn:hover{border-color:var(--red);color:var(--red)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.sv{font-size:28px;font-weight:800;line-height:1;margin-bottom:6px}
.sl{font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase}
.sc.sg .sv{color:var(--green)}.sc.sr .sv{color:var(--red)}.sc.sy .sv{color:var(--yellow)}.sc.sb .sv{color:var(--blue)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sinput{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 14px;outline:none;width:200px}
.fbtn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 14px;font-size:11px;cursor:pointer;transition:all .2s}
.fbtn:hover,.fbtn.act{background:rgba(255,255,255,.1);color:var(--text);border-color:rgba(255,255,255,.2)}
.fbtn.act{border-color:var(--green);color:var(--green)}
.cbadge{font-size:10px;color:var(--text3);margin-left:auto}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.thead{display:grid;grid-template-columns:2fr 1.2fr 0.8fr 0.8fr 1fr 0.8fr;padding:12px 20px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
.th{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.tbody{max-height:580px;overflow-y:auto}
.row{display:grid;grid-template-columns:2fr 1.2fr 0.8fr 0.8fr 1fr 0.8fr;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.row:hover{background:rgba(255,255,255,.02)}
.row:last-child{border-bottom:none}
.row.wr{background:rgba(248,113,113,.03)}
.nm{font-size:13px;font-weight:600}
.cp{display:flex;flex-direction:column;gap:5px}
.pb{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--green);border-radius:2px}
.pp{font-size:11px;font-weight:700;color:var(--text2)}
.cw{font-size:12px;font-weight:600;color:var(--text2)}
.cd{font-size:11px;color:var(--text2);font-family:var(--mono)}
.tn{font-size:11px;color:var(--text2)}.tw2{font-size:11px;color:var(--yellow)}.td{font-size:11px;color:var(--red)}
.bgs{display:flex;gap:5px;flex-wrap:wrap}
.bg{font-size:9px;letter-spacing:1px;text-transform:uppercase;border-radius:5px;padding:3px 7px;font-weight:600}
.bs{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.ba{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.bn{background:rgba(250,204,21,.1);color:var(--yellow);border:1px solid rgba(250,204,21,.2)}
.erow{padding:40px;text-align:center;color:var(--text3);font-size:13px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">MLYNR.</div>
    <div class="login-sub">Admin Paneli</div>
    <label class="lbl">Admin Şifresi</label>
    <input class="linput" id="ap" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">GİRİŞ YAP →</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center">
      <div class="hlogo">MLYNR.</div>
      <div class="hbadge">Admin Panel</div>
    </div>
    <div class="hright">
      <div class="lupd" id="lupd"></div>
      <button class="rbtn" onclick="loadData()">↻ Yenile</button>
      <button class="obtn" onclick="doLogout()">Çıkış</button>
    </div>
  </div>

  <div class="sgrid" id="sgrid"><div class="sc"><span class="spin"></span>Yükleniyor...</div></div>

  <div class="toolbar">
    <input class="sinput" id="srch" placeholder="İsim ara..." oninput="renderTable()">
    <button class="fbtn act" id="f-all" onclick="sf('all')">Tümü</button>
    <button class="fbtn" id="f-active" onclick="sf('active')">Bugün Aktif</button>
    <button class="fbtn" id="f-warn" onclick="sf('warn')">3+ Gün Yok ⚠️</button>
    <button class="fbtn" id="f-sale" onclick="sf('sale')">İlk Satış ✅</button>
    <span class="cbadge" id="cbadge"></span>
  </div>

  <div class="tw">
    <div class="thead">
      <div class="th">Kursiyer</div>
      <div class="th">İlerleme</div>
      <div class="th">Hafta</div>
      <div class="th">Gün</div>
      <div class="th">Son Giriş</div>
      <div class="th">Durum</div>
    </div>
    <div class="tbody" id="tbody"><div class="erow"><span class="spin"></span>Yükleniyor...</div></div>
  </div>
</div>

<script>
const EP = 'https://xrelhozqawdseobxqbju.supabase.co/functions/v1/rapid-endpoint';
const PASS = 'MLYNR2025ADMIN';
const TOTAL = 28;
var users = [], flt = 'all';

function doLogin(){
  var p = document.getElementById('ap').value;
  if(p === PASS){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else {
    document.getElementById('lerr').textContent='Şifre yanlış.';
    document.getElementById('ap').value='';
  }
}
function doLogout(){
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('ap').value='';
}

async function loadData(){
  document.getElementById('tbody').innerHTML='<div class="erow"><span class="spin"></span>Yükleniyor...</div>';
  try {
    var res = await fetch(EP, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({tool:'admin-data', adminKey: PASS})
    });
    var d = await res.json();
    if(d.error){ throw new Error(d.error); }
    users = (d.users||[]).map(function(u){
      var done = u.done||0;
      var pct = Math.round(done/TOTAL*100);
      var week = Math.min(4,Math.ceil((done+1)/7))||1;
      var last = u.updated_at ? new Date(u.updated_at) : null;
      var days = last ? Math.floor((Date.now()-last.getTime())/86400000) : 999;
      return {name:u.full_name||'İsimsiz',done:done,pct:pct,week:week,
        sale:!!u.first_sale,last:last,days:days,
        isNew:done<=2,isActive:days===0,isWarn:days>=3};
    });
    renderStats();
    renderTable();
    document.getElementById('lupd').textContent=new Date().toLocaleTimeString('tr-TR');
  } catch(e){
    document.getElementById('tbody').innerHTML='<div class="erow" style="color:var(--red)">Hata: '+e.message+'</div>';
  }
}

function renderStats(){
  var t=users.length,a=0,w=0,s=0,pts=0;
  users.forEach(function(u){if(u.isActive)a++;if(u.isWarn)w++;if(u.sale)s++;pts+=u.pct;});
  var avg=t>0?Math.round(pts/t):0;
  document.getElementById('sgrid').innerHTML=
    sc('','Toplam',t)+sc('sg','Bugün Aktif',a)+sc('sr','3+ Gün Yok',w)+sc('sy','İlk Satış',s)+sc('sb','Ort. İlerleme','%'+avg);
}
function sc(cls,l,v){return'<div class="sc '+cls+'"><div class="sv">'+v+'</div><div class="sl">'+l+'</div></div>';}

function sf(f){
  flt=f;
  ['all','active','warn','sale'].forEach(function(id){
    var el=document.getElementById('f-'+id);
    if(el)el.classList.toggle('act',id===f);
  });
  renderTable();
}

function renderTable(){
  var s=(document.getElementById('srch').value||'').toLowerCase();
  var list=users.filter(function(u){
    if(s&&u.name.toLowerCase().indexOf(s)<0)return false;
    if(flt==='active')return u.isActive;
    if(flt==='warn')return u.isWarn;
    if(flt==='sale')return u.sale;
    return true;
  });
  document.getElementById('cbadge').textContent=list.length+' kursiyer';
  if(!list.length){document.getElementById('tbody').innerHTML='<div class="erow">Bulunamadı.</div>';return;}
  var html='';
  list.forEach(function(u){
    var tc='tn',ts='';
    if(u.days===0){ts='Bugün';}
    else if(u.days===1){ts='Dün';}
    else if(u.days>=7){ts=u.days+' gün önce';tc='td';}
    else if(u.days>=3){ts=u.days+' gün önce';tc='tw2';}
    else{ts=u.days+' gün önce';}
    var bgs='';
    if(u.sale)bgs+='<span class="bg bs">Satış</span>';
    if(u.isActive)bgs+='<span class="bg ba">Aktif</span>';
    if(u.isNew)bgs+='<span class="bg bn">Yeni</span>';
    html+='<div class="row'+(u.isWarn&&!u.isActive?' wr':'')+'">'+
      '<div class="nm">'+esc(u.name)+'</div>'+
      '<div class="cp"><div class="pb"><div class="pf" style="width:'+u.pct+'%"></div></div><div class="pp">%'+u.pct+' · '+u.done+'/'+TOTAL+'</div></div>'+
      '<div class="cw">H.'+u.week+'</div>'+
      '<div class="cd">'+u.done+'</div>'+
      '<div class="'+tc+'">'+ts+'</div>'+
      '<div class="bgs">'+bgs+'</div>'+
    '</div>';
  });
  document.getElementById('tbody').innerHTML=html;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
